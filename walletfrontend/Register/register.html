<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WalletWo — Create Account</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../Config/config.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #080c14;
        --bg2: #0e1420;
        --bg3: #141b2b;
        --border: rgba(255, 255, 255, 0.07);
        --border2: rgba(255, 255, 255, 0.12);
        --text: #f0f2f7;
        --muted: #7a8299;
        --faint: #3a4155;
        --lime: #c6f135;
        --lime-dark: #96bc1a;
        --red: #f44;
        --green: #3ddc84;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: "Outfit", sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* NAV */
      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 3rem;
        height: 68px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.8rem;
        letter-spacing: 0.05em;
        cursor: pointer;
      }
      .logo span {
        color: var(--lime);
      }
      .nav-link {
        background: none;
        border: none;
        color: var(--muted);
        font-family: "Outfit", sans-serif;
        font-size: 0.875rem;
        cursor: pointer;
      }
      .nav-link:hover {
        color: var(--text);
      }

      /* LAYOUT */
      .page {
        display: grid;
        grid-template-columns: 1fr 1fr;
        flex: 1;
      }

      /* LEFT PANEL */
      .left {
        background: var(--bg2);
        border-right: 1px solid var(--border);
        padding: 4rem 3.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .left-bg {
        position: absolute;
        bottom: -80px;
        right: -80px;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(198, 241, 53, 0.06) 0%,
          transparent 65%
        );
        pointer-events: none;
      }
      .left-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(198, 241, 53, 0.25);
        border-radius: 100px;
        padding: 6px 14px;
        font-size: 0.78rem;
        color: var(--lime);
        margin-bottom: 2rem;
        width: fit-content;
      }
      .left-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3.5rem;
        letter-spacing: 0.03em;
        line-height: 1;
        margin-bottom: 1rem;
        position: relative;
      }
      .left-title .accent {
        color: var(--lime);
      }
      .left-desc {
        font-size: 0.925rem;
        color: var(--muted);
        line-height: 1.75;
        max-width: 340px;
        margin-bottom: 2.5rem;
        position: relative;
      }

      .perks {
        display: flex;
        flex-direction: column;
        gap: 14px;
        position: relative;
      }
      .perk {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 0.875rem;
        color: rgba(240, 242, 247, 0.65);
      }
      .perk-icon {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: rgba(198, 241, 53, 0.1);
        border: 1px solid rgba(198, 241, 53, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        flex-shrink: 0;
      }

      /* RIGHT PANEL */
      .right {
        padding: 3.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
      }
      .form-wrap {
        width: 100%;
        max-width: 420px;
      }

      .form-heading {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.4rem;
        letter-spacing: 0.03em;
        margin-bottom: 0.4rem;
      }
      .form-sub {
        font-size: 0.875rem;
        color: var(--muted);
        margin-bottom: 2rem;
      }
      .form-sub a {
        color: var(--lime);
        cursor: pointer;
        text-decoration: none;
      }
      .form-sub a:hover {
        text-decoration: underline;
      }

      /* FIELDS */
      .field {
        margin-bottom: 1.1rem;
      }
      .field label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 7px;
      }
      .input-wrap {
        position: relative;
      }
      .input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.9rem;
        pointer-events: none;
      }
      input {
        width: 100%;
        padding: 12px 14px 12px 40px;
        background: var(--bg2);
        color: var(--text);
        border: 1px solid var(--border2);
        border-radius: 10px;
        font-family: "Outfit", sans-serif;
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
        appearance: none;
      }
      input:focus {
        border-color: var(--lime);
        box-shadow: 0 0 0 3px rgba(198, 241, 53, 0.08);
      }
      input::placeholder {
        color: var(--faint);
      }
      input.error-field {
        border-color: var(--red);
      }

      .field-hint {
        font-size: 0.75rem;
        margin-top: 5px;
      }
      .hint-err {
        color: var(--red);
      }
      .hint-ok {
        color: var(--green);
      }

      .submit-btn {
        width: 100%;
        padding: 14px;
        background: var(--lime);
        color: #080c14;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-family: "Outfit", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        transition: all 0.15s;
        margin-top: 0.5rem;
        letter-spacing: 0.01em;
      }
      .submit-btn:hover {
        background: var(--lime-dark);
        transform: translateY(-1px);
      }
      .submit-btn:active {
        transform: scale(0.98);
      }

      .error-box {
        background: rgba(255, 68, 68, 0.08);
        border: 1px solid rgba(255, 68, 68, 0.25);
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 0.85rem;
        color: var(--red);
        margin-bottom: 1.25rem;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .success-box {
        background: rgba(61, 220, 132, 0.08);
        border: 1px solid rgba(61, 220, 132, 0.25);
        border-radius: 10px;
        padding: 14px 16px;
        font-size: 0.875rem;
        color: var(--green);
        margin-bottom: 1.25rem;
      }
      .success-box strong {
        display: block;
        font-size: 1rem;
        margin-bottom: 4px;
      }

      .terms {
        font-size: 0.775rem;
        color: var(--faint);
        margin-top: 1.25rem;
        text-align: center;
        line-height: 1.6;
      }
      .terms a {
        color: var(--muted);
        text-decoration: underline;
        text-underline-offset: 2px;
        cursor: pointer;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fu {
        animation: fadeUp 0.45s ease both;
      }
      .fu1 {
        animation-delay: 0.05s;
      }
      .fu2 {
        animation-delay: 0.12s;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { Component } = React;

      class Register extends Component {
        constructor(props) {
          super(props);
          this.state = {
            username: "",
            email: "",
            password: "",
            phone: "",
            touched: {},
            error: "",
            success: false,
          };
        }

        touch(field) {
          this.setState((s) => ({ touched: { ...s.touched, [field]: true } }));
        }

        validate() {
          const { username, email, password, phone } = this.state;
          if (!username.trim()) return "Username is required.";
          if (username.trim().length < 3)
            return "Username must be at least 3 characters.";
          if (!email.trim()) return "Email address is required.";
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
            return "Please enter a valid email.";
          if (!phone.trim()) return "Phone number is required.";
          if (!/^\+?[\d\s\-()]{7,}$/.test(phone))
            return "Please enter a valid phone number.";
          if (!password) return "Password is required.";
          if (password.length < 8)
            return "Password must be at least 8 characters.";
          return null;
        }

        async handleSubmit(e) {
          e.preventDefault();

          const err = this.validate();
          if (err) {
            this.setState({ error: err });
            return;
          }

          const { username, email, password, phone } = this.state;

          try {
            const res = await fetch(API.REGISTER, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                username,
                email,
                password,
                phone_number: phone,
              }),
            });

            const data = await res.json();

            if (!res.ok) {
              this.setState({
                error: data.username || data.email || "Registration failed.",
              });
              return;
            }
            this.setState({
              success: true,
              error: "",
            });
          } catch (err) {
            this.setState({
              error: "Server error. Is your API running?",
            });
          }
        }

        render() {
          const { username, email, password, phone, touched, error, success } =
            this.state;
          const set = (field) => (e) =>
            this.setState({ [field]: e.target.value, error: "" });

          const usernameErr =
            touched.username &&
            username.trim().length > 0 &&
            username.trim().length < 3;
          const emailErr =
            touched.email && email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
          const pwStrong =
            password.length >= 8 &&
            /[A-Z]/.test(password) &&
            /[0-9]/.test(password);
          const pwFair = password.length >= 8 && !pwStrong;

          return (
            <>
              <nav>
                <div
                  className="logo"
                  onClick={() => (window.location.href = "../index.html")}
                >
                  Wallet<span>Wo</span>
                </div>
                <span style={{ fontSize: "0.85rem", color: "var(--muted)" }}>
                  Already have an account?{" "}
                  <button
                    className="nav-link"
                    onClick={() =>
                      (window.location.href = "../Login/login.html")
                    }
                    style={{ color: "var(--lime)", fontWeight: 600 }}
                  >
                    Sign in
                  </button>
                </span>
              </nav>

              <div className="page">
                {/* LEFT */}
                <div className="left">
                  <div className="left-bg" />
                  <div className="left-tag">✦ Join WalletWo</div>
                  <h2 className="left-title">
                    YOUR
                    <br />
                    <span className="accent">WALLET</span>
                    <br />
                    AWAITS
                  </h2>
                  <p className="left-desc">
                    Set up your free WalletWo account in seconds. No paperwork.
                    No hidden fees. Just fast, secure money.
                  </p>
                  <div className="perks">
                    {[
                      ["⚡", "Instant account activation"],
                      ["🔒", "256-bit AES encryption"],
                      ["💸", "Zero transaction fees"],
                      ["🌍", "Send money worldwide"],
                    ].map(([ic, t]) => (
                      <div className="perk" key={t}>
                        <div className="perk-icon">{ic}</div>
                        {t}
                      </div>
                    ))}
                  </div>
                </div>

                {/* RIGHT */}
                <div className="right">
                  <div className="form-wrap fu">
                    <h1 className="form-heading fu">Create account</h1>
                    <p className="form-sub fu fu1">
                      Already have one?{" "}
                      <a onClick={() => (window.location.href = "login.html")}>
                        Sign in here
                      </a>
                    </p>

                    {success && (
                      <div className="success-box">
                        <strong>🎉 Account created!</strong>
                        Your WalletWo wallet is ready.{" "}
                        <a
                          style={{
                            color: "var(--green)",
                            cursor: "pointer",
                            textDecoration: "underline",
                          }}
                          onClick={() => (window.location.href = "login.html")}
                        >
                          Sign in now →
                        </a>
                      </div>
                    )}
                    {error && <div className="error-box">⚠ {error}</div>}

                    {!success && (
                      <form onSubmit={(e) => this.handleSubmit(e)}>
                        <div className="field fu fu1">
                          <label>Username</label>
                          <div className="input-wrap">
                            <span className="input-icon">@</span>
                            <input
                              type="text"
                              placeholder="yourhandle"
                              value={username}
                              onChange={set("username")}
                              onBlur={() => this.touch("username")}
                              className={usernameErr ? "error-field" : ""}
                            />
                          </div>
                          {usernameErr && (
                            <div className="field-hint hint-err">
                              Must be at least 3 characters
                            </div>
                          )}
                          {touched.username && username.trim().length >= 3 && (
                            <div className="field-hint hint-ok">
                              ✓ Looks good
                            </div>
                          )}
                        </div>

                        <div className="field fu fu1">
                          <label>Email address</label>
                          <div className="input-wrap">
                            <span className="input-icon">✉</span>
                            <input
                              type="email"
                              placeholder="you@example.com"
                              value={email}
                              onChange={set("email")}
                              onBlur={() => this.touch("email")}
                              className={emailErr ? "error-field" : ""}
                            />
                          </div>
                          {emailErr && (
                            <div className="field-hint hint-err">
                              Please enter a valid email
                            </div>
                          )}
                          {touched.email && !emailErr && email && (
                            <div className="field-hint hint-ok">
                              ✓ Valid email
                            </div>
                          )}
                        </div>

                        <div className="field fu fu2">
                          <label>Phone number</label>
                          <div className="input-wrap">
                            <span className="input-icon">📱</span>
                            <input
                              type="tel"
                              placeholder="+1 555 000 0000"
                              value={phone}
                              onChange={set("phone")}
                              onBlur={() => this.touch("phone")}
                            />
                          </div>
                        </div>

                        <div className="field fu fu2">
                          <label>Password</label>
                          <div className="input-wrap">
                            <span className="input-icon">🔑</span>
                            <input
                              type="password"
                              placeholder="Min. 8 characters"
                              value={password}
                              onChange={set("password")}
                              onBlur={() => this.touch("password")}
                            />
                          </div>
                          {password && (
                            <div
                              className="field-hint"
                              style={{
                                color: pwStrong
                                  ? "var(--green)"
                                  : pwFair
                                  ? "#f0a500"
                                  : "var(--red)",
                              }}
                            >
                              {pwStrong
                                ? "✓ Strong password"
                                : pwFair
                                ? "~ Fair — add uppercase & numbers"
                                : "✗ Too short"}
                            </div>
                          )}
                        </div>

                        <button type="submit" className="submit-btn">
                          Create my wallet →
                        </button>
                        <p className="terms">
                          By registering you agree to our{" "}
                          <a>Terms of Service</a> and <a>Privacy Policy</a>.
                        </p>
                      </form>
                    )}
                  </div>
                </div>
              </div>
            </>
          );
        }
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<Register />);
    </script>
  </body>
</html>
